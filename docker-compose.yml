version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: accounts,transfers
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  account-service:
    build: ./account-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/accounts
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy

  transfer-service:
    build: ./transfer-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/transfers
      ACCOUNT_SERVICE_URL: http://account-service:5001
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      account-service:
        condition: service_started

volumes:
  pgdata:
